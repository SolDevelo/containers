name: Build and Publish

on:
  push:
    branches: [main]
    paths:
      - 'soldevelo/**/debian-12/**'
  workflow_dispatch:
    inputs:
      image_paths:
        description: >
          Comma-separated list of images to build. Supports wildcards. Examples:
            '*'                           -> all images
            'pgpool'                      -> all versions of pgpool
            'kafka/*'                     -> all versions of kafka
            'kafka/4.2'                   -> soldevelo/kafka/4.2/debian-12
            'soldevelo/kafka/4.2/debian-12' -> exact path (as-is)
        required: true
      tag_suffix:
        description: >
          Optional suffix appended to all tags, e.g. -test.
          Leave empty for production tags.
          Test tags can be deleted from Docker Hub afterwards.
        required: false
        default: ''
      confirm_push:
        description: >-
          Set to 'yes' to actually push images to Docker Hub after a successful build.
          Leave empty to build only (no push).
        required: false
        default: ''
      flatten:
        description: >-
          Which images to flatten after push. Default 'kafka' flattens only the kafka image.
          Use 'all' to flatten every image, a single name (e.g. 'schema-registry'),
          or a comma-separated list (e.g. 'kafka,schema-registry'). Use 'false' to skip entirely.
        required: false
        default: 'kafka'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -- Detect which image directories need building --
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            # Manual dispatch: expand each comma-separated entry.
            # Supported formats:
            #   '*'                -> all images
            #   'pgpool'           -> all versions of pgpool  (soldevelo/pgpool/*/debian-12)
            #   'kafka/*'          -> all versions of kafka
            #   'kafka/4.2'        -> soldevelo/kafka/4.2/debian-12
            #   'soldevelo/...'    -> full path, used as-is
            expanded=()
            IFS=',' read -ra entries <<< "${{ inputs.image_paths }}"
            for entry in "${entries[@]}"; do
              entry="${entry// /}"  # strip spaces
              if [[ "$entry" == '*' ]]; then
                # All images
                while IFS= read -r dir; do
                  expanded+=("$dir")
                done < <(find soldevelo -name 'tags-info.yaml' -exec dirname {} \; 2>/dev/null | sort -V)
              elif [[ "$entry" == soldevelo/* ]]; then
                # Full path provided, use as-is
                expanded+=("$entry")
              elif [[ "$entry" == *'/*' ]]; then
                # name/* wildcard: all versions of an image
                name="${entry%/*}"
                while IFS= read -r dir; do
                  expanded+=("$dir")
                done < <(find "soldevelo/$name" -name 'tags-info.yaml' -exec dirname {} \; 2>/dev/null | sort -V)
              elif [[ "$entry" != */* ]]; then
                # Bare name: expand all versions
                while IFS= read -r dir; do
                  expanded+=("$dir")
                done < <(find "soldevelo/$entry" -name 'tags-info.yaml' -exec dirname {} \; 2>/dev/null | sort -V)
              else
                # name/version shorthand
                expanded+=("soldevelo/$entry/debian-12")
              fi
            done
            images=$(printf '%s\n' "${expanded[@]}" | sort -Vu | jq -Rc '.' | jq -sc '.')
          else
            # Push: find changed debian-12 directories, oldest version first
            images=$(git diff --name-only HEAD^ HEAD \
              | grep -oE 'soldevelo/[^/]+/[^/]+/debian-[0-9]+' \
              | sort -Vu \
              | jq -Rc '.' | jq -sc '.')
          fi

          if [[ -z "$images" || "$images" == '[]' ]]; then
            echo "No images to build."
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            matrix=$(echo "$images" | jq -c '{include: map({image: .})}')
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "Images to build: $images"
          fi

  # -- Build each image (without push, no approval needed) --
  build:
    needs: detect
    if: needs.detect.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate and read tags-info.yaml
        id: info
        shell: bash
        run: |
          TAGS_FILE="${{ matrix.image }}/tags-info.yaml"
          if [[ ! -f "$TAGS_FILE" ]]; then
            echo "::error::Missing $TAGS_FILE - cannot determine tags for ${{ matrix.image }}"
            exit 1
          fi

          IMAGE_NAME=$(echo "${{ matrix.image }}" | cut -d/ -f2)
          REVISION=$(yq '.revision // 0' "$TAGS_FILE")

          SUFFIX="${{ inputs.tag_suffix }}"
          TAGS=""
          while IFS= read -r tag; do
            if [[ "$tag" =~ ^[0-9]+(\.[0-9]+)*-debian-[0-9]+$ ]]; then
              # debian-qualified tags: only emit the revision-pinned variant (e.g. 17-debian-12-r3)
              TAGS="${TAGS}soldevelo/${IMAGE_NAME}:${tag}-r${REVISION}${SUFFIX},"
            else
              # plain tags (17, 17.6.0) stay as-is
              TAGS="${TAGS}soldevelo/${IMAGE_NAME}:${tag}${SUFFIX},"
            fi
          done < <(yq '.rolling-tags[]' "$TAGS_FILE")

          TAGS="${TAGS%,}"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "Tags: $TAGS"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build (without push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.info.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

  # -- Push each image to Docker Hub (only when confirm_push == 'yes') --
  push:
    needs: [detect, build]
    if: needs.detect.outputs.matrix != '{"include":[]}' && inputs.confirm_push == 'yes'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
      max-parallel: 2

    permissions:
      contents: read
      packages: write  # needed to push temp image to GHCR

    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read tags-info.yaml
        id: info
        shell: bash
        run: |
          TAGS_FILE="${{ matrix.image }}/tags-info.yaml"
          # Image name is the second path component: soldevelo/<name>/...
          IMAGE_NAME=$(echo "${{ matrix.image }}" | cut -d/ -f2)
          REVISION=$(yq '.revision // 0' "$TAGS_FILE")

          # Build the comma-separated tag list expected by build-push-action
          SUFFIX="${{ inputs.tag_suffix }}"
          TAGS=""
          while IFS= read -r tag; do
            if [[ "$tag" =~ ^[0-9]+(\.[0-9]+)*-debian-[0-9]+$ ]]; then
              # debian-qualified tags: only emit the revision-pinned variant (e.g. 17-debian-12-r3)
              TAGS="${TAGS}soldevelo/${IMAGE_NAME}:${tag}-r${REVISION}${SUFFIX},"
            else
              # plain tags (17, 17.6.0) stay as-is
              TAGS="${TAGS}soldevelo/${IMAGE_NAME}:${tag}${SUFFIX},"
            fi
          done < <(yq '.rolling-tags[]' "$TAGS_FILE")

          TAGS="${TAGS%,}"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          # GHCR requires lowercase owner
          echo "ghcr_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      # Push to GHCR first: Docker Hub's HAProxy rejects large blob PUT commits
      # (~1 GB layers hit a 400 error). Crane then copies to Docker Hub using
      # PATCH-based chunked upload, which is accepted consistently.

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR (temporary)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ghcr.io/${{ steps.info.outputs.ghcr_owner }}/${{ steps.info.outputs.image_name }}:build-${{ github.run_id }}
          cache-from: type=gha,scope=${{ matrix.image }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Copy to Docker Hub
        id: crane
        shell: bash
        run: |
          IMAGE_NAME="${{ steps.info.outputs.image_name }}"
          SRC="ghcr.io/${{ steps.info.outputs.ghcr_owner }}/${IMAGE_NAME}:build-${{ github.run_id }}"

          # Install crane
          CRANE_VERSION=$(curl -sSfL https://api.github.com/repos/google/go-containerregistry/releases/latest \
            | grep '"tag_name"' | grep -oE 'v[0-9.]+')
          curl -sSfL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xz crane
          sudo mv crane /usr/local/bin/crane
          crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          crane auth login index.docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"

          while IFS=, read -ra tags_arr; do
            for tag in "${tags_arr[@]}"; do
              [[ -z "$tag" ]] && continue
              echo "Copying $tag ..."
              crane copy "$SRC" "$tag"
            done
          done <<< "${{ steps.info.outputs.tags }}"

      - name: Flatten image layers
        if: inputs.flatten != 'false'
        shell: bash
        run: |
          FLATTEN="${{ inputs.flatten }}"
          IMAGE_NAME="${{ steps.info.outputs.image_name }}"

          should_flatten=false
          if [[ "$FLATTEN" == "all" ]]; then
            should_flatten=true
          else
            IFS=',' read -ra flatten_list <<< "$FLATTEN"
            for name in "${flatten_list[@]}"; do
              name="${name// /}"
              if [[ "$name" == "$IMAGE_NAME" ]]; then
                should_flatten=true
                break
              fi
            done
          fi

          if [[ "$should_flatten" != "true" ]]; then
            echo "Skipping flatten for $IMAGE_NAME (not in flatten list: $FLATTEN)"
            exit 0
          fi

          crane auth login index.docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
          while IFS=, read -ra tags_arr; do
            for tag in "${tags_arr[@]}"; do
              [[ -z "$tag" ]] && continue
              echo "Flattening $tag ..."
              crane flatten "$tag" --tag "$tag"
            done
          done <<< "${{ steps.info.outputs.tags }}"

      - name: Delete GHCR temp image
        if: always()
        shell: bash
        run: |
          crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" 2>/dev/null || true
          crane delete "ghcr.io/${{ steps.info.outputs.ghcr_owner }}/${{ steps.info.outputs.image_name }}:build-${{ github.run_id }}" || true
